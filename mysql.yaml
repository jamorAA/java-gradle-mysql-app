version: '3'
services:
  mysql:
    image: mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PWD}
      - MYSQL_DATABASE=${DB_NAME}
    volumes:
      - mysql-vol:/var/lib/mysql
  phpmyadmin:
    image: phpmyadmin
    ports:
      - "8083:80"
    environment:
      - PMA_HOST=mysql
    restart: always
volumes:
  mysql-vol:
    driver: local
